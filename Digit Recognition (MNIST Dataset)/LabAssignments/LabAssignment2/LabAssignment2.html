<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>Lab 2 — Draw & Classify · MNIST</title>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.16.0/dist/tf.min.js"></script>
  <style>
    body { font-family: Arial, sans-serif; background: #f4f4f4; padding: 30px; max-width: 680px; margin: auto; }
    h1 { color: #333; margin-bottom: 6px; }
    p  { color: #666; margin-bottom: 20px; }
    .layout { display: flex; gap: 24px; align-items: flex-start; flex-wrap: wrap; }
    /* Canvas panel */
    .canvas-panel { background: #fff; border: 1px solid #ddd; border-radius: 12px; padding: 20px; display: flex; flex-direction: column; gap: 12px; align-items: center; }
    canvas { background: #000; border-radius: 6px; cursor: crosshair; display: block; touch-action: none; }
    .brush-row { display: flex; gap: 8px; align-items: center; font-size: 13px; color: #666; }
    .brush-btn { padding: 5px 12px; border: 1px solid #ccc; border-radius: 6px; background: #f9f9f9; cursor: pointer; font-size: 12px; }
    .brush-btn.active { background: #6c47ff; color: #fff; border-color: #6c47ff; }
    .btn-train { width: 100%; padding: 10px; background: #6c47ff; color: #fff; border: none; border-radius: 8px; font-size: 14px; cursor: pointer; }
    .btn-train:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-clear { width: 100%; padding: 10px; background: #fff; color: #e53e3e; border: 1px solid #e53e3e; border-radius: 8px; font-size: 14px; cursor: pointer; }
    .progress-wrap { width: 100%; background: #eee; border-radius: 4px; height: 6px; }
    #prog-bar { height: 6px; width: 0%; background: #6c47ff; border-radius: 4px; transition: width 0.2s; }
    #status { font-size: 12px; color: #888; text-align: center; }
    /* Result panel */
    .result-panel { background: #fff; border: 1px solid #ddd; border-radius: 12px; padding: 20px; flex: 1; min-width: 200px; display: flex; flex-direction: column; gap: 16px; }
    .pred-box { text-align: center; padding: 16px; background: #f9f9f9; border-radius: 10px; }
    .pred-digit { font-size: 72px; font-weight: bold; color: #6c47ff; line-height: 1; }
    .pred-conf { font-size: 15px; color: #555; margin-top: 6px; }
    .prob-row { display: flex; align-items: center; gap: 8px; font-size: 12px; }
    .prob-lbl { width: 12px; color: #888; text-align: right; flex-shrink: 0; }
    .prob-track { flex: 1; background: #eee; border-radius: 3px; height: 7px; overflow: hidden; }
    .prob-fill { height: 100%; background: #6c47ff; border-radius: 3px; width: 0%; transition: width 0.3s; }
    .prob-fill.top { background: #f0a500; }
    .prob-pct { width: 38px; text-align: right; color: #888; }
  </style>
</head>
<body>

  <h1>Lab 2 — Draw a Digit & Classify</h1>
  <p>Train the model once, then draw any digit (0–9) for real-time prediction.</p>

  <div class="layout">

    <!-- Left: Draw panel -->
    <div class="canvas-panel">
      <canvas id="drawCanvas" width="220" height="220"></canvas>

      <div class="brush-row">
        Brush:
        <button class="brush-btn" id="bs" onclick="setBrush(10)">S</button>
        <button class="brush-btn active" id="bm" onclick="setBrush(15)">M</button>
        <button class="brush-btn" id="bl" onclick="setBrush(22)">L</button>
      </div>

      <div class="progress-wrap"><div id="prog-bar"></div></div>
      <div id="status">Click "Train Model" to start.</div>

      <button class="btn-train" id="btn-train" onclick="trainModel()">▶ Train Model</button>
      <button class="btn-clear" onclick="clearCanvas()">✕ Clear Canvas</button>
    </div>

    <!-- Right: Result panel -->
    <div class="result-panel">
      <div class="pred-box">
        <div class="pred-digit" id="pred-digit">?</div>
        <div class="pred-conf" id="pred-conf">Train first →</div>
      </div>
      <div id="prob-list"></div>
    </div>

  </div>

  <script>
    // ── MNIST Loader (same as Lab 1) ───────────────────────────
    class MnistData {
      async load() {
        const img = new Image(), c = document.createElement('canvas'), cx = c.getContext('2d');
        await new Promise((res, rej) => {
          img.crossOrigin = '';
          img.onload = () => {
            const buf = new ArrayBuffer(65000 * 784 * 4);
            c.width = img.width; c.height = 5000;
            for (let i = 0; i < 13; i++) {
              cx.drawImage(img, 0, i * 5000, img.width, 5000, 0, 0, img.width, 5000);
              const px = cx.getImageData(0, 0, c.width, 5000).data;
              const sl = new Float32Array(buf, i * 784 * 5000 * 4, 784 * 5000);
              for (let j = 0; j < px.length / 4; j++) sl[j] = px[j * 4] / 255;
            }
            this.images = new Float32Array(buf); res();
          }; img.onerror = rej;
          img.src = 'https://storage.googleapis.com/learnjs-data/model-builder/mnist_images.png';
        });
        this.labels = new Uint8Array(await (await fetch('https://storage.googleapis.com/learnjs-data/model-builder/mnist_labels_uint8')).arrayBuffer());
        this.idx = tf.util.createShuffledIndices(55000); this.c = 0;
      }
      batch(n) {
        const imgs = new Float32Array(n * 784), lbls = new Uint8Array(n * 10);
        for (let i = 0; i < n; i++) {
          this.c = (this.c + 1) % 55000;
          const id = this.idx[this.c];
          imgs.set(this.images.slice(id * 784, id * 784 + 784), i * 784);
          lbls.set(this.labels.slice(id * 10, id * 10 + 10), i * 10);
        }
        return { xs: tf.tensor2d(imgs, [n, 784]), labels: tf.tensor2d(lbls, [n, 10]) };
      }
    }

    // ── State ──────────────────────────────────────────────────
    let model = null, trained = false, brushR = 15, drawing = false;
    const canvas = document.getElementById('drawCanvas');
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = '#000'; ctx.fillRect(0, 0, 220, 220);
    buildProbBars();

    // ── Train Model ────────────────────────────────────────────
    async function trainModel() {
      document.getElementById('btn-train').disabled = true;
      setStatus('Loading data…');

      const data = new MnistData(); await data.load();
      setStatus('Building model…');

      // CNN architecture
      model = tf.sequential();
      model.add(tf.layers.conv2d({ inputShape: [28, 28, 1], filters: 32, kernelSize: 3, padding: 'same', activation: 'relu' }));
      model.add(tf.layers.maxPooling2d({ poolSize: 2 }));
      model.add(tf.layers.conv2d({ filters: 64, kernelSize: 3, padding: 'same', activation: 'relu' }));
      model.add(tf.layers.maxPooling2d({ poolSize: 2 }));
      model.add(tf.layers.flatten());
      model.add(tf.layers.dense({ units: 128, activation: 'relu' }));
      model.add(tf.layers.dense({ units: 10, activation: 'softmax' }));
      model.compile({ optimizer: 'adam', loss: 'categoricalCrossentropy', metrics: ['accuracy'] });

      const EPOCHS = 5, STEPS = 120, BS = 128;
      const total = EPOCHS * STEPS; let done = 0;

      for (let ep = 0; ep < EPOCHS; ep++) {
        for (let s = 0; s < STEPS; s++) {
          const b = data.batch(BS);
          const h = await model.fit(b.xs.reshape([BS, 28, 28, 1]), b.labels, { epochs: 1, verbose: 0 });
          b.xs.dispose(); b.labels.dispose();
          document.getElementById('prog-bar').style.width = (++done / total * 100).toFixed(1) + '%';
        }
        setStatus(`Training epoch ${ep + 1}/${EPOCHS}…`);
      }

      trained = true;
      setStatus('Model ready! Draw a digit.');
      document.getElementById('btn-train').disabled = false;
    }

    // ── Predict from canvas ────────────────────────────────────
    function predict() {
      if (!trained) return;
      // Center and crop the drawn digit (so it matches MNIST format)
      const tmp = document.createElement('canvas'); tmp.width = 28; tmp.height = 28;
      const tCtx = tmp.getContext('2d');
      tCtx.drawImage(canvas, 0, 0, 28, 28);
      const raw = tCtx.getImageData(0, 0, 28, 28).data;
      let x0 = 28, x1 = -1, y0 = 28, y1 = -1;
      for (let y = 0; y < 28; y++) for (let x = 0; x < 28; x++) {
        if (raw[(y * 28 + x) * 4] > 10) { x0 = Math.min(x0, x); x1 = Math.max(x1, x); y0 = Math.min(y0, y); y1 = Math.max(y1, y); }
      }
      if (x1 < 0) return;
      const cW = x1 - x0 + 1, cH = y1 - y0 + 1, sc = 20 / Math.max(cW, cH);
      const dW = Math.round(cW * sc), dH = Math.round(cH * sc);
      const oX = Math.round((28 - dW) / 2), oY = Math.round((28 - dH) / 2);
      const cen = document.createElement('canvas'); cen.width = 28; cen.height = 28;
      const cCtx = cen.getContext('2d');
      cCtx.fillStyle = '#000'; cCtx.fillRect(0, 0, 28, 28);
      cCtx.drawImage(tmp, x0, y0, cW, cH, oX, oY, dW, dH);
      const fd = cCtx.getImageData(0, 0, 28, 28).data;
      const pixels = new Float32Array(784);
      for (let i = 0; i < 784; i++) pixels[i] = fd[i * 4] / 255;

      const input = tf.tensor4d(pixels, [1, 28, 28, 1]);
      const preds = model.predict(input);
      preds.data().then(probs => {
        input.dispose(); preds.dispose();
        const digit = probs.indexOf(Math.max(...probs));
        const conf  = (Math.max(...probs) * 100).toFixed(1);
        document.getElementById('pred-digit').textContent = digit;
        document.getElementById('pred-conf').textContent  = conf + '% confident';
        updateProbBars(Array.from(probs));
      });
    }

    // ── Canvas drawing ─────────────────────────────────────────
    function pos(e) {
      const r = canvas.getBoundingClientRect();
      return e.touches ? { x: e.touches[0].clientX - r.left, y: e.touches[0].clientY - r.top } : { x: e.offsetX, y: e.offsetY };
    }
    function drawDot(e) {
      const p = pos(e);
      const g = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, brushR);
      g.addColorStop(0, 'rgba(255,255,255,1)'); g.addColorStop(1, 'rgba(255,255,255,0)');
      ctx.fillStyle = g; ctx.beginPath(); ctx.arc(p.x, p.y, brushR, 0, Math.PI * 2); ctx.fill();
    }
    canvas.addEventListener('mousedown',  e => { drawing = true; drawDot(e); });
    canvas.addEventListener('mousemove',  e => { if (drawing) drawDot(e); });
    canvas.addEventListener('mouseup',    ()  => { drawing = false; predict(); });
    canvas.addEventListener('mouseleave', ()  => { if (drawing) { drawing = false; predict(); } });
    canvas.addEventListener('touchstart', e => { e.preventDefault(); drawing = true; drawDot(e); }, { passive: false });
    canvas.addEventListener('touchmove',  e => { e.preventDefault(); if (drawing) drawDot(e); }, { passive: false });
    canvas.addEventListener('touchend',   e => { e.preventDefault(); drawing = false; predict(); }, { passive: false });

    function clearCanvas() {
      ctx.fillStyle = '#000'; ctx.fillRect(0, 0, 220, 220);
      document.getElementById('pred-digit').textContent = '?';
      document.getElementById('pred-conf').textContent  = trained ? 'Draw a digit →' : 'Train first →';
      resetProbBars();
    }

    function setBrush(r) {
      brushR = r;
      ['bs','bm','bl'].forEach(id => document.getElementById(id).classList.remove('active'));
      document.getElementById(r === 10 ? 'bs' : r === 15 ? 'bm' : 'bl').classList.add('active');
    }

    function setStatus(msg) { document.getElementById('status').textContent = msg; }

    // ── Probability bars ───────────────────────────────────────
    function buildProbBars() {
      const el = document.getElementById('prob-list');
      for (let i = 0; i < 10; i++) {
        el.innerHTML += `<div class="prob-row">
          <div class="prob-lbl">${i}</div>
          <div class="prob-track"><div class="prob-fill" id="pf${i}"></div></div>
          <div class="prob-pct" id="pp${i}">0%</div>
        </div>`;
      }
    }
    function updateProbBars(probs) {
      const max = probs.indexOf(Math.max(...probs));
      for (let i = 0; i < 10; i++) {
        const p = (probs[i] * 100).toFixed(1);
        document.getElementById(`pf${i}`).style.width = p + '%';
        document.getElementById(`pf${i}`).className = 'prob-fill' + (i === max ? ' top' : '');
        document.getElementById(`pp${i}`).textContent = p + '%';
      }
    }
    function resetProbBars() {
      for (let i = 0; i < 10; i++) {
        document.getElementById(`pf${i}`).style.width = '0%';
        document.getElementById(`pp${i}`).textContent = '0%';
      }
    }
  </script>
</body>
</html>
