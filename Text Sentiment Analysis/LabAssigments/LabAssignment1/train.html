<body>

<div class="card">
<h1>Step 1: Train Classifier</h1>
<button id="train-btn">Train Models (Dense + RNN)</button>
<div id="train-status" class="status-box">Waiting to start...</div>
</div>

<div class="card">
<h1>Step 2: Test Sentence</h1>

<input id="user-text" placeholder="Enter sentence" disabled>

<button id="predict-btn" disabled style="background:#27ae60">Analyze Sentiment</button>

<div id="results-area" style="display:none">

<div class="score-display" id="final-label">---</div>

<div class="meter-bg">
<div id="meter-fill"></div>
</div>

<div style="display:flex;justify-content:space-between;font-size:14px">
<span>NEGATIVE</span>
<span id="numeric-score">0.50</span>
<span>POSITIVE</span>
</div>

</div>
</div>

<div class="card">
<h2>Step 3: Model Comparison</h2>

<p>Dense Accuracy: <b id="dense-acc">--</b></p>
<p>RNN Accuracy: <b id="rnn-acc">--</b></p>

</div>

<script>

const rawData=[
{s:"i love this product",l:1},
{s:"amazing and great",l:1},
{s:"excellent happy work",l:1},
{s:"wonderful fantastic day",l:1},
{s:"hate this so much",l:0},
{s:"terrible and bad",l:0},
{s:"worst ever disappointed",l:0},
{s:"awful quality poor",l:0}
];

const words=[...new Set(rawData.flatMap(d=>d.s.split(" ")))];
const vocab=Object.fromEntries(words.map((w,i)=>[w,i+1]));
const vocabSize=words.length+1;
const maxLen=4;

function encode(text){
let tokens=text.toLowerCase().split(" ").map(w=>vocab[w]||0);
return tokens.length<maxLen?
[...tokens,...Array(maxLen-tokens.length).fill(0)]
:tokens.slice(0,maxLen);
}

let denseModel;
let rnnModel;

function buildDense(){

let m=tf.sequential();

m.add(tf.layers.embedding({inputDim:vocabSize,outputDim:8,inputLength:maxLen}));
m.add(tf.layers.flatten());
m.add(tf.layers.dense({units:1,activation:"sigmoid"}));

m.compile({optimizer:"adam",loss:"binaryCrossentropy",metrics:["accuracy"]});

return m;

}

function buildRNN(){

let m=tf.sequential();

m.add(tf.layers.embedding({inputDim:vocabSize,outputDim:8,inputLength:maxLen}));
m.add(tf.layers.simpleRNN({units:8}));
m.add(tf.layers.dense({units:1,activation:"sigmoid"}));

m.compile({optimizer:"adam",loss:"binaryCrossentropy",metrics:["accuracy"]});

return m;

}

const trainBtn=document.getElementById("train-btn");

trainBtn.onclick=async()=>{

trainBtn.disabled=true;

document.getElementById("train-status").innerText="Training models...";

const xs=tf.tensor2d(rawData.map(d=>encode(d.s)));
const ys=tf.tensor2d(rawData.map(d=>[d.l]));

denseModel=buildDense();
rnnModel=buildRNN();

let d=await denseModel.fit(xs,ys,{epochs:50});
let r=await rnnModel.fit(xs,ys,{epochs:50});

let denseAcc=d.history.acc.slice(-1)[0];
let rnnAcc=r.history.acc.slice(-1)[0];

document.getElementById("dense-acc").innerText=(denseAcc*100).toFixed(2)+"%";
document.getElementById("rnn-acc").innerText=(rnnAcc*100).toFixed(2)+"%";

document.getElementById("train-status").innerText="Training Complete";

document.getElementById("user-text").disabled=false;
document.getElementById("predict-btn").disabled=false;

};

document.getElementById("predict-btn").onclick=()=>{

const text=document.getElementById("user-text").value;

const input=tf.tensor2d([encode(text)]);

const pred=denseModel.predict(input);

const score=pred.dataSync()[0];

document.getElementById("results-area").style.display="block";

const isPos=score>0.5;

const label=document.getElementById("final-label");

label.innerText=isPos?"POSITIVE":"NEGATIVE";
label.style.color=isPos?"#27ae60":"#e74c3c";

document.getElementById("meter-fill").style.width=(score*100)+"%";
document.getElementById("meter-fill").style.background=isPos?"#27ae60":"#e74c3c";

document.getElementById("numeric-score").innerText="Confidence: "+score.toFixed(4);

};

</script>

</body>
</html>
