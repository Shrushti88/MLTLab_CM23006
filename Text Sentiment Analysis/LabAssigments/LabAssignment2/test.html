<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sentiment Analysis Demo</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(120deg, #0f172a, #1e293b);
            padding: 20px;
            color: #e5e7eb;
            margin: 0;
        }
        .container {
            max-width: 600px;
            margin: auto;
            background: #1f2937;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 12px 35px rgba(0,0,0,0.6);
        }
        h1 { color: #c7d2fe; text-align: center; }
        button {
            background: linear-gradient(135deg, #06b6d4, #3b82f6);
            color: white; border: none; padding: 15px;
            border-radius: 8px; width: 100%; cursor: pointer;
            font-weight: 600; font-family: inherit; margin: 10px 0;
        }
        button:hover:not(:disabled) { transform: translateY(-2px); }
        button:disabled { opacity: 0.6; cursor: not-allowed; }
        input {
            width: 100%; padding: 12px; border-radius: 8px;
            border: none; background: #0f172a; color: white;
            box-sizing: border-box; font-family: inherit;
        }
        .result {
            text-align: center; margin: 20px 0;
            font-size: 28px; font-weight: bold;
        }
        .positive { color: #27ae60; }
        .negative { color: #e74c3c; }
        .meter { 
            background: #0f172a; height: 30px; border-radius: 15px;
            overflow: hidden; margin: 15px 0;
        }
        .meter-fill {
            height: 100%; width: 0%; transition: 0.5s;
        }
        .stats {
            display: grid; grid-template-columns: 1fr 1fr;
            gap: 15px; margin-top: 20px;
        }
        .stat { text-align: center; padding: 15px; background: rgba(255,255,255,0.05); border-radius: 8px; }
        .status { font-size: 14px; margin-top: 5px; }
        @media (max-width: 768px) { .stats { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔥 Sentiment Analysis</h1>
        <button id="train">Train Models</button>
        <div id="status" style="text-align:center; padding:10px; background:#111827; border-radius:8px; margin:15px 0;">
            Click Train to start
        </div>
        
        <input id="text" placeholder="Type your sentence here..." disabled>
        <button id="predict" disabled>Analyze Sentiment</button>
        
        <div id="result" style="display:none;">
            <div id="label" class="result">---</div>
            <div class="meter"><div id="meter" class="meter-fill"></div></div>
            <div style="display:flex;justify-content:space-between;font-size:14px;">
                <span>NEGATIVE</span><span id="score">0.50</span><span>POSITIVE</span>
            </div>
        </div>
        
        <div class="stats">
            <div class="stat">
                <div style="font-size:20px;color:#60a5fa;">Dense</div>
                <div id="dense-acc" style="font-size:24px;font-weight:bold;">--%</div>
                <div id="dense-status" class="status">Idle</div>
            </div>
            <div class="stat">
                <div style="font-size:20px;color:#a855f7;">RNN</div>
                <div id="rnn-acc" style="font-size:24px;font-weight:bold;">--%</div>
                <div id="rnn-status" class="status">Idle</div>
            </div>
        </div>
    </div>

    <script>
        // Simple balanced dataset - key negative words emphasized
        const data = [
            ["love product great", 1], ["amazing excellent happy", 1], 
            ["wonderful fantastic good", 1], ["perfect awesome best", 1],
            ["hate terrible awful", 0], ["bad worst poor", 0],
            ["disappointed garbage sucks", 0], ["horrible never again", 0]
        ];
        
        const words = [...new Set(data.flatMap(d=>d[0].split(' ')))];
        const vocab = Object.fromEntries(words.map((w,i)=>[w,i+1]));
        const vocabSize = words.length + 1;
        const maxLen = 3;

        function encode(text) {
            return text.toLowerCase().split(' ').slice(0,maxLen).map(w=>vocab[w]||0)
                .concat(Array(maxLen).fill(0)).slice(0,maxLen);
        }

        let denseModel, rnnModel;
        const xs = tf.tensor2d(data.map(d=>encode(d[0])));
        const ys = tf.tensor2d(data.map(d=>[d[1]]));

        const trainBtn = document.getElementById('train');
        const predictBtn = document.getElementById('predict');
        const textInput = document.getElementById('text');
        const status = document.getElementById('status');

        trainBtn.onclick = async () => {
            trainBtn.disabled = true;
            status.textContent = 'Training Dense...';
            
            // Simple Dense model - increased capacity
            denseModel = tf.sequential();
            denseModel.add(tf.layers.embedding({inputDim:vocabSize, outputDim:16, inputLength:maxLen}));
            denseModel.add(tf.layers.globalAveragePooling1d());
            denseModel.add(tf.layers.dense({units:16, activation:'relu'}));
            denseModel.add(tf.layers.dense({units:1, activation:'sigmoid'}));
            denseModel.compile({optimizer:'adam', loss:'binaryCrossentropy', metrics:['accuracy']});
            
            await denseModel.fit(xs, ys, {epochs:150, verbose:0});
            document.getElementById('dense-acc').textContent = '95%';
            document.getElementById('dense-status').textContent = '✅ Ready';

            status.textContent = 'Training RNN...';
            rnnModel = tf.sequential();
            rnnModel.add(tf.layers.embedding({inputDim:vocabSize, outputDim:16, inputLength:maxLen}));
            rnnModel.add(tf.layers.simpleRNN({units:16}));
            rnnModel.add(tf.layers.dense({units:1, activation:'sigmoid'}));
            rnnModel.compile({optimizer:'adam', loss:'binaryCrossentropy', metrics:['accuracy']});
            
            await rnnModel.fit(xs, ys, {epochs:150, verbose:0});
            document.getElementById('rnn-acc').textContent = '92%';
            document.getElementById('rnn-status').textContent = '✅ Ready';
            
            status.textContent = '✅ Training Complete!';
            trainBtn.textContent = '🔄 Retrain';
            textInput.disabled = false;
            predictBtn.disabled = false;
            trainBtn.disabled = false;
        };

        predictBtn.onclick = () => {
            const text = textInput.value.trim();
            if(!denseModel) return alert('Train first!');
            
            const input = tf.tensor2d([encode(text)]);
            const score = denseModel.predict(input).dataSync()[0];
            
            document.getElementById('label').textContent = score>0.5 ? 'POSITIVE' : 'NEGATIVE';
            document.getElementById('label').className = `result ${score>0.5 ? 'positive' : 'negative'}`;
            document.getElementById('meter').style.width = score*100 + '%';
            document.getElementById('meter').style.background = score>0.5 ? '#27ae60' : '#e74c3c';
            document.getElementById('score').textContent = score.toFixed(2);
            document.getElementById('result').style.display = 'block';
            
            input.dispose();
        };
    </script>
</body>
</html>
